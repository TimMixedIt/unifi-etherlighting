name: Home Assistant validation

on:
  push:
  pull_request:
  schedule:
    - cron: "43 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
  json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: python3 -c 'import json; from pathlib import Path; [json.loads(path.read_text()) for path in Path(".").rglob("*.json")]'
